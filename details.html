<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>V&A Collection Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/details_styles.css">
  <style>
    .back-link { display: none; margin: 0.5rem 1.5rem; font-family: 'Lato', sans-serif; font-size: 0.95rem; }
    .back-link a { text-decoration: none; opacity: 0.75; transition: opacity 0.2s; }
    .back-link a:hover { opacity: 1; }
    body.linked-mode .back-link { display: block; }
    body.linked-mode .browse-bar { display: none; }
    body.linked-mode .browse-help { display: none; }
  </style>
</head>
<body>

<header>
  <span id="logo-mark">M|E</span>
  <h1 id="site-title">Museum Explorer</h1>
  <nav>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="details.html" class="active">Details</a>
    </div>
  </nav>
</header>

<div class="back-link"><a href="index.html">← Back to collection</a></div>

<!-- Model loading progress banner -->
<div id="model-banner">
  <span id="model-status">Loading OWL-ViT model…</span>
  <div class="progress-wrap"><div class="progress-fill" id="model-progress"></div></div>
</div>

<div class="browse-bar">
<label>Objects</label>
  <input type="number" id="pageSize" value="8" min="1" max="100"/>
  <label>Minimum confidence</label>
  <input type="range" id="threshold" min="0.01" max="0.30" step="0.01" value="0.10"/>
  <span id="thresholdVal" class="threshold-value">10%</span>
  <div class="preset-chips">
    <button class="chip" data-value="0.03">Show all</button>
    <button class="chip active" data-value="0.10">Balanced</button>
    <button class="chip" data-value="0.20">Strict</button>
  </div>
  <button class="btn" id="runBtn" onclick="run()" disabled>Load Collection</button>
  <button class="btn secondary" id="prevBtn" onclick="navigate(-1)" disabled>← Prev</button>
  <button class="btn secondary" id="nextBtn" onclick="navigate(1)" disabled>Next →</button>
</div>

<div class="browse-help">Lower values show more detections; higher values show only the AI's most confident guesses.</div>

<div id="status">Waiting for model to load…</div>
<div id="strip-wrap"><div id="strip"></div></div>

<main id="main">
  <div class="placeholder-msg">
    <div class="big">🏛</div>
    <p>The OWL-ViT model is loading into your browser.<br>Once ready, click <strong>Load Collection</strong> to begin.</p>
  </div>
</main>

<script>
  // Apply linked-mode class early so browse bar is hidden before module loads
  if (new URLSearchParams(window.location.search).get('id')) {
    document.body.classList.add('linked-mode');
  }
</script>
<script type="module" src="js/details.js"></script>
</body>
</html>

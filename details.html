<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>V&A Collection Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/details_styles.css">
</head>
<body>

<nav>
  <div class="logo">Museum <span style="color:var(--cream);font-weight:400">Collection</span></div>
</nav>

<!-- Model loading progress banner -->
<div id="model-banner">
  <span id="model-status">Loading OWL-ViT model…</span>
  <div class="progress-wrap"><div class="progress-fill" id="model-progress"></div></div>
</div>

<div class="browse-bar">
  <label>Objects</label>
  <input type="number" id="pageSize" value="12" min="1" max="100"/>
  <label style="margin-left:8px">Confidence</label>
  <input type="range" id="threshold" min="0.01" max="0.5" step="0.01" value="0.03"/>
  <span id="thresholdVal" style="font-family:'Lato';font-size:0.75rem;color:var(--ink);min-width:30px">0.03</span> <!-- PUT IN CSS FILE INSTEAD OF INLINE STYLES IF KEEPING-->
  <button class="btn" id="runBtn" onclick="run()" disabled>Load Collection</button>
  <button class="btn secondary" id="prevBtn" onclick="navigate(-1)" disabled>← Prev</button>
  <button class="btn secondary" id="nextBtn" onclick="navigate(1)" disabled>Next →</button>
</div>

<div id="status">Waiting for model to load…</div>
<div id="strip-wrap"><div id="strip"></div></div>

<main id="main">
  <div class="placeholder-msg">
    <div class="big">🏛</div>
    <p>The OWL-ViT model is loading into your browser.<br>Once ready, click <strong>Load Collection</strong> to begin.</p>
  </div>
</main>

<script type="module" src="js/details.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="js/homepage.js" type="module"></script>
    <link rel="stylesheet" href="css/homepage.css">
    <title>M|E Museum Explorer</title>
</head>
<body>
    <header>
        <div id="site-brand">
            <span id="logo-mark">M|E</span>
            <h1 id="site-title">Museum Explorer</h1>
        </div>
        <nav id="filters" aria-label="Filter collection">
            <fieldset class="filter-row">
                <button id="btn-category" aria-pressed="true">Category</button>
                <ul id="filter-category-options" role="group" aria-label="Category filters"></ul>
                <search>
                    <label for="filter-search-type">Search</label>
                    <input type="search" id="filter-search-type" placeholder="e.g. teddy bear, doll...">
                </search>
            </fieldset>
            <fieldset class="filter-row">
                <button id="btn-material" aria-pressed="false">Material</button>
                <ul id="filter-material-options" role="group" aria-label="Material filters"></ul>
                <search>
                    <label for="filter-search-mat">Search</label>
                    <input type="search" id="filter-search-mat" placeholder="e.g. wood, fabric...">
                </search>
            </fieldset>
            <!-- <button id="btn-export" disabled>Export clusters</button> -->
        </nav>
    </header>
    <p id="results-status" role="status"></p>
    <main>
        <section id="homepage" aria-label="Collection results"></section>
        <!-- aside#ai-panel injected here by JS when classification starts -->
    </main>
    <footer>
        <p>M|E Museum Explorer | Young V&amp;A Dolls &amp; Toys collection | CIS3411 Group 2</p>
        <p>Collection data sourced from the Victoria and Albert Museum API</p>
        <p>Natalie Wilkinson | David Opoku | Craig Jones | Greta Ivanovaite</p>
    </footer>
</body>
</html>

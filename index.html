<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="homepage.js" type="module"></script>
    <link rel="stylesheet" href="css/homepage.css">
    <title>V&A AI Explorer</title>
</head>
<body>
    <header>
    <nav id="filters" aria-label="Filter collection">
        <div id="filter-mode" role="group" aria-label="Filter by">
            <button id="btn-category" aria-pressed="false">Category</button>
            <button id="btn-material" aria-pressed="false">Material</button>
        </div>
        <div id="filter-options" role="group" aria-label="Filter options"></div>
        <div id="filter-search-group">
            <label for="filter-search">Search within results</label>
            <input type="search" id="filter-search" placeholder="e.g. plane, teddy bear...">
        </div>
        <p id="results-status" role="status"></p>
        <!-- <button id="btn-export" disabled>Export clusters</button> -->
    </nav>
    </header>
    <main id="homepage" aria-label="Collection results"></main>
</body>
</html>
